services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - melotech
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - melotech
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/src/generated
    networks:
      - melotech
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:3001
    ports:
      - '3000:3000'
    environment:
      BACKEND_INTERNAL_URL: http://backend:3001
      NODE_ENV: development
      PORT: 3000
    depends_on:
      backend:
        condition: service_started
    networks:
      - melotech

networks:
  melotech:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
